# GMD Model Configuration — HyperSpec
# Native equivariant graph neural network

model:
  backbone:
    name: hyperspec
    num_elements: 120
    embedding_dim: 64
    hidden_channels: 128
    num_interactions: 3
    lmax: 2
    cutoff: 5.0
    num_radial_basis: 8

  head:
    name: energy_forces
    irreps_in: "128x0e+128x1o+128x2e"
    hidden_dim: 64
    compute_stress: false
