# W&B Sweeps — cloud-managed hyperparameter optimisation
# Usage: goal-tune hparams_search=wandb_sweep
#
# Requires: wandb (already a core dependency)
#
# The sweep agent runs on your machine but the controller lives on
# W&B servers.  Supports Bayesian optimisation, grid, and random
# search with early termination.
#
# Create & run in one command:
#   goal-tune hparams_search=wandb_sweep
#
# Or resume an existing sweep:
#   goal-tune hparams_search=wandb_sweep hparams_search.sweep_id=<SWEEP_ID>

hparams_search:
  method: wandb

  # --- W&B project settings ---
  project: goal
  entity: null # null → default W&B entity
  sweep_id: null # null → create new sweep; set to resume

  # --- Sweep controller ---
  sweep_method: bayes # 'bayes', 'grid', 'random'
  metric: val/total
  mode: min # 'min' or 'max'
  count: 20 # max number of runs (null → unlimited)

  # --- Early termination (optional) ---
  # Hyperband-style: stops underperforming runs early
  early_terminate:
    type: hyperband
    min_iter: 10 # min epochs before pruning
    eta: 3 # top 1/η survive each bracket

  # --- Search space ---
  # W&B sweep parameter spec: distribution + values
  # Distributions: uniform, log_uniform_values, q_uniform, int_uniform,
  #                categorical, constant
  parameters:
    training.optimizer.lr:
      distribution: log_uniform_values
      min: 1.0e-5
      max: 1.0e-2
    training.optimizer.weight_decay:
      distribution: log_uniform_values
      min: 1.0e-8
      max: 1.0e-3
    training.losses.0.weight:
      distribution: uniform
      min: 1.0
      max: 20.0
    training.ema.decay:
      distribution: uniform
      min: 0.99
      max: 0.9999
