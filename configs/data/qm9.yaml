# QM9 — quantum chemistry molecular properties
# Usage: gmd-train data=qm9

data:
  _target_: examples.datasets.qm9.QM9Dataset
  root: ${hydra:runtime.cwd}/data/qm9
  target: homo           # property to predict (see QM9_TARGETS for options)
  cutoff: 5.0
  seed: 42

  batch_size: 128
  valid_batch_size: 256
  num_workers: 4
  pin_memory: true
