# GMD Data Configuration — LMDB dataset
# FairChem/OCP-compatible format with fast random access

data:
  dataset_type: lmdb
  root: ${paths.data_dir}
  cutoff: 5.0
  batch_size: 32
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  energy_key: energy
  forces_key: forces
  stress_key: stress

  # --- Multi-file / splitting options ---
  merge_strategy: sequential
  split_ratio: [0.8, 0.1, 0.1]
  split_seed: 42
