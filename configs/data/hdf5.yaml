# GOAL Data Configuration — HDF5 dataset
# Pre-processed atomic graphs with random access

data:
  dataset_type: hdf5
  root: ${paths.data_dir}
  cutoff: 5.0
  batch_size: 32
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

  # --- Multi-file / splitting options ---
  merge_strategy: sequential
  split_ratio: [0.8, 0.1, 0.1]
  split_seed: 42
