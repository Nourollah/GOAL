# Backbone Finetuning callback — gradual unfreezing
# Freezes the backbone initially, then unfreezes layers progressively.
# Useful when fine-tuning pretrained adapters (MACE, FairChem).
#
# Usage: python train.py callbacks=backbone_finetuning

backbone_finetuning:
  _target_: lightning.pytorch.callbacks.BackboneFinetuning
  # Epoch at which backbone is unfrozen
  unfreeze_backbone_at_epoch: 10
  # Multiplicative factor for backbone LR relative to head LR
  lambda_func: null
  # Initial LR for backbone when unfrozen (default: use optimizer LR)
  backbone_initial_lr: null
  # Ratio for backbone LR compared to rest of model
  backbone_initial_ratio_lr: 0.1
  # Whether to make backbone params trainable after unfreezing
  should_align: true
  # Verbose logging of freeze/unfreeze events
  verbose: true
